steps:
  # 0. Create Dockerfile (Workaround for missing file in repo)
  - name: 'ubuntu'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "FROM node:20-slim" > Dockerfile
        echo "RUN apt-get update && apt-get install -y python3 python3-pip python3-venv build-essential && rm -rf /var/lib/apt/lists/*" >> Dockerfile
        echo "WORKDIR /app" >> Dockerfile
        echo "RUN python3 -m venv /opt/venv" >> Dockerfile
        echo 'ENV PATH="/opt/venv/bin:$$PATH"' >> Dockerfile
        echo "RUN pip3 install torch onnx tf2onnx tensorflow-cpu ultralytics opencv-python-headless" >> Dockerfile
        echo "COPY package*.json ./" >> Dockerfile
        echo "RUN npm ci" >> Dockerfile
        echo "COPY . ." >> Dockerfile
        echo "RUN npm run build" >> Dockerfile
        echo "ENV PORT=3000" >> Dockerfile
        echo "ENV NODE_ENV=production" >> Dockerfile
        echo "EXPOSE 3000" >> Dockerfile
        echo "CMD [\"npm\", \"start\"]" >> Dockerfile
        cat Dockerfile

  # 1. Build the Docker image
  # Force fresh build
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/t-ii-aivision-platform:${SHORT_SHA}', '.']

  # 2. Push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/t-ii-aivision-platform:${SHORT_SHA}']

  # 3. Deploy to Cloud Run
  - name: 'google/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 't-ii-aivision-platform'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/t-ii-aivision-platform:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--cpu=${_CPU}'
      - '--memory=${_MEMORY}'
      - '--concurrency=${_CONCURRENCY}'
      - '--timeout=${_TIMEOUT}'
      - '--min-instances=${_MIN_INSTANCES}'
      - '--max-instances=${_MAX_INSTANCES}'
      - '--service-account=${_SERVICE_ACCOUNT_NAME}'
      - '--session-affinity'
      - '--allow-unauthenticated'
      - '--execution-environment=gen2'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_REPO}/t-ii-aivision-platform:${SHORT_SHA}'

substitutions:
  _REGION: 'asia-southeast1'
  _ARTIFACT_REGISTRY_REPO: 'cloudrun-app'
  _SERVICE_ACCOUNT_NAME: 'svca-gc-npr-hxai-run-web@prj-gc-npr-temai-rtai-01.iam.gserviceaccount.com'
  _CPU: '1'
  _MEMORY: '512Mi'
  _CONCURRENCY: '80'
  _TIMEOUT: '300'
  _MIN_INSTANCES: '0'
  _MAX_INSTANCES: '10'

options:
  logging: CLOUD_LOGGING_ONLY
